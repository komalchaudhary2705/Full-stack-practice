<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX Checker</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <span class="box"></span>
        FX_CHECKER
    </div>

    <div class="right">
        55 CURRENCIES • LIVE DATA
    </div>
</header>

<div class="ticker">
    <div>USD/JPY 157.91 ▲ +0.04%</div>
    <div>GBP/USD 1.3575 ▼ -0.22%</div>
    <div>EUR/GBP 0.8633 ▲ +0.11%</div>
    <div>AUD/USD 0.7208 ▲ +0.08%</div>
    <div>USD/CAD 1.3815 ▲ +0.04%</div>
</div>

<main>

<h2>CHECK THE RATE</h2>

<div class="converter">

    <div class="currency-card">

        <label>SEND</label>

        <div class="input-box">
            <input type="number" value="1000">

            <select>
                <option>USD</option>
                <option>EUR</option>
                <option>GBP</option>
            </select>
        </div>

    </div>

    <button class="swap">⇄</button>

    <div class="currency-card">

        <label>RECEIVE</label>

        <div class="input-box">
            <input class="green" value="853.02">

            <select>
                <option>EUR</option>
                <option>USD</option>
                <option>GBP</option>
            </select>
        </div>

    </div>

</div>

<div class="rate">
    1 USD = 0.8530 EUR
</div>

<div class="stats">

    <div class="stat">
        <small>OPEN</small>
        <h3>0.8516</h3>
    </div>

    <div class="stat">
        <small>LAST</small>
        <h3>0.8530</h3>
    </div>

    <div class="stat">
        <small>CHANGE</small>
        <h3 class="green">+0.0014</h3>
    </div>

    <div class="stat">
        <small>% CHANGE</small>
        <h3 class="green">▲ +0.16%</h3>
    </div>

</div>

<div class="chart-card">

    <div class="chart-header">
        <h3>USD/EUR</h3>

        <div class="filters">
            <button>1D</button>
            <button>1W</button>
            <button class="active">1M</button>
            <button>1Y</button>
        </div>
    </div>

    <canvas id="chart"></canvas>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
