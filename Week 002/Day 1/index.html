<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css"
      integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        font-weight: 600;
      }
      html,
      body {
        width: 100%;
        height: 100%;
      }

      #header {
        width: 100vw;
        height: 100vh;
        background-image: url(mountian-bg.jpg);
        background-size: cover;
        background-position: center;
        padding: 25px;
        padding-top: 250px;
      }
      #header {
        font-size: 40px;
        color: white;
      }
      #header button {
        background-color: #007acc;
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <section id="header">
      <h1>
        Explore
        <br />
        Northern Pakistan
      </h1>
      <button>Explore Now <i class="ri-arrow-right-long-line"></i></button>
    </section>
  </body>
</html>
