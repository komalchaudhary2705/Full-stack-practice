<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CSS Animation Assignment</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f4f7fb;
      }

      /* Navbar */

      header {
        width: 100%;
        background: teal;
        position: fixed;
        top: 0;
        z-index: 1000;
      }

      nav {
        width: 90%;
        margin: auto;
        padding: 20px;
      }

      ul {
        display: flex;
        justify-content: center;
        gap: 30px;
        list-style: none;
      }

      ul li a {
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: bold;
      }

      section {
        min-height: 100vh;
        padding: 120px 50px;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Task Cards */

      .task {
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 90%;
        max-width: 600px;
        box-shadow: 0 10px 20px #ccc;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        gap: 70px;
      }

      /* Task 1 Button */

      .animate-btn {
        padding: 15px 35px;
        background: teal;
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 20px;
        cursor: pointer;
        margin: 40px auto;
        transition: 0.4s;
      }

      .animate-btn:hover {
        background: red;
        transform: scale(1.1);
      }

      /* Task 2 Ball */

      .ball {
        width: 80px;
        height: 80px;
        margin: 40px auto;
        background: teal;
        border-radius: 50%;
        animation: bounce 1s infinite;
      }

      @keyframes bounce {
        0% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-50px);
        }

        100% {
          transform: translateY(0);
        }
      }

      /* Task 3 Progress */

      .progress {
        width: 80%;
        height: 30px;
        background: #ddd;
        margin: 40px auto;
        border-radius: 20px;
        overflow: hidden;
      }

      .bar {
        height: 100%;
        width: 0%;
        background: teal;

        animation: load 3s infinite;
      }

      @keyframes load {
        0% {
          width: 0%;
        }

        100% {
          width: 100%;
        }
      }

      /* Task 4 Gallery */

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      .gallery img {
        width: 100%;
        height: 200px;
        border-radius: 15px;
        transition: 0.4s;
      }

      .gallery img:hover {
        transform: scale(1.1) rotate(5deg);
      }
    </style>
  </head>

  <body>
    <header>
      <nav>
        <ul>
          <li><a href="#button">Button</a></li>

          <li><a href="#ball">Ball</a></li>

          <li><a href="#progress">Progress</a></li>

          <li><a href="#gallery">Gallery</a></li>
        </ul>
      </nav>
    </header>

    <!-- Task 1 -->

    <section id="button">
      <div class="task">
        <h1>Task 1: Animated Button</h1>
        <button class="animate-btn">Hover Me</button>
      </div>
    </section>

    <!-- Task 2 -->

    <section id="ball">
      <div class="task">
        <h1>Task 2: Bouncing Ball</h1>
        <div class="ball"></div>
      </div>
    </section>

    <!-- Task 3 -->

    <section id="progress">
      <div class="task">
        <h1>Task 3: Loading Progress Bar</h1>

        <div class="progress">
          <div class="bar"></div>
        </div>
      </div>
    </section>

    <!-- Task 4 -->

    <section id="gallery">
      <div class="task">
        <h1>Task 4: Animated Image Gallery</h1>

        <div class="gallery">
          <img src="images/book-1.png" />

          <img src="images/book-2.png" />

          <img src="images/book-3.png" />

          <img src="images/book-4.png" />

          <img src="images/book-3.png" />

          <img src="images/book-6.png" />
        </div>
      </div>
    </section>
  </body>
</html>
