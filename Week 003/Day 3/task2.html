<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-color: black;
    }

    ul {
      list-style-type: none;
      display: flex;
      gap: 20px;
    }
    a {
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      cursor: pointer;
    }
    section {
      width: 100%;
      min-height: 100vh;
    }
    .gallery {
      width: 80%;
      margin: auto;
      padding: 50px 0;
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 10px;
      /* background-color: antiquewhite; */
      
    }
    .gallery img{
      width: 100%;
      height: 200px;
    }
    @media(max-width:1199px){
      .gallery{
        grid-template-columns: repeat(2,1fr);
      }
    }
     @media(max-width:768px){
      .gallery{
        grid-template-columns: repeat(1,1fr);
      }
    }
  </style>
  <body>
    <nav>
      <ul>
        <li><a href="task1.html">Taks-1</a></li>
        <li><a href="task2.html">Task-2</a></li>
        <li><a href="task3.html">Task-3</a></li>
      </ul>
    </nav>
    <section>
      <div class="gallery">
        <img src="./images/gallery-1.jpg" alt="gallery-1" />
        <img src="./images/gallery-2.jpg" alt="gallery-2" />
        <img src="./images/gallery-3.jpg" alt="gallery-3" />
        <img src="./images/gallery-4.jpg" alt="gallery-4" />
        <img src="./images/gallery-1.jpg" alt="gallery-1" />
        <img src="./images/gallery-2.jpg" alt="gallery-2" />
        <img src="./images/gallery-3.jpg" alt="gallery-3" />
        <img src="./images/gallery-4.jpg" alt="gallery-4" />
      </div>
    </section>
  </body>
</html>
