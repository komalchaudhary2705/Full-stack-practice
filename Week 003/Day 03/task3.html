<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-color: black;
    }

    ul {
      list-style-type: none;
      display: flex;
      gap: 20px;
    }
    a {
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      cursor: pointer;
    }
    section {
      width: 100%;
      min-height: 90vh;
      padding: 20px;
      display: flex;
    }
    .sidebar {
      width: 200px;
      background-color: bisque;
      border: 1px solid red;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .main-content {
      flex: 1;
      background-color: aqua;
      border: 1px solid red;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    @media(max-width:768px){
        section{
            flex-direction: column;
        }
        .sidebar{
            width: 100%;
            height: 50px;
        }
    }
  </style>
  <body>
    <nav>
      <ul>
        <li><a href="task1.html">Taks-1</a></li>
        <li><a href="task2.html">Task-2</a></li>
        <li><a href="task3.html">Task-3</a></li>
      </ul>
    </nav>
    <section>
      <div class="sidebar">sidebar</div>
      <div class="main-content">main content</div>
    </section>
  </body>
</html>
